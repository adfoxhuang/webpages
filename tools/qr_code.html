<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網址轉 QR Code 產生器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QR Code 產生器</h2>
    <input type="text" id="urlInput" placeholder="請貼上網址 (例如 https://google.com)">
    <br>
    <button onclick="generateQR()">產生 QR Code</button>
    
    <div id="qrcode"></div>
</div>

<script>
    // 初始化 QR Code 物件
	var qrcode = new QRCode(document.getElementById("qrcode"), {
		text: "https://google.com",
		width: 320,
		height: 320,
		colorDark : "#000000",       // 深藍色格子，比純黑更有質感
		colorLight : "#ffffff",      // 白色背景
		// 設定為最低容錯率，讓格子數量最小化
		correctLevel : QRCode.CorrectLevel.L 
	});

    function generateQR() {
        var url = document.getElementById("urlInput").value;
        if (url.trim() === "") {
            alert("請輸入網址！");
            return;
        }
        // 清除舊的 QR Code 並產生新的
        qrcode.makeCode(url);
    }
</script>

</body>
</html>
