<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>自定義轉盤抽獎</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
        .container { display: flex; gap: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-area { display: flex; flex-direction: column; }
        textarea { width: 250px; height: 300px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .wheel-area { position: relative; }
        canvas { border-radius: 50%; border: 5px solid #333; }
        #arrow {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #e74c3c; z-index: 10;
        }
        button {
            margin-top: 15px; padding: 10px 25px; font-size: 18px; cursor: pointer;
            background: #3498db; color: white; border: none; border-radius: 5px; transition: 0.3s;
        }
        button:hover { background: #2980b9; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>

    <h2>🎡 自定義名單轉盤</h2>

    <div class="container">
        <div class="input-area">
            <p>請輸入名單 (一行一個)：</p>
            <textarea id="names" placeholder="例如：&#10;小明&#10;小華&#10;大強" oninput="drawWheel()"></textarea>
            <button onclick="spin()">開始旋轉！</button>
        </div>

        <div class="wheel-area">
            <div id="arrow"></div>
            <canvas id="wheelCanvas" width="400" height="400"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        let currentRotation = 0;
        let isSpinning = false;

        function getNames() {
            return document.getElementById('names').value.split('\n').filter(name => name.trim() !== '');
        }

        function drawWheel() {
            const names = getNames();
            const numSegments = names.length;
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (numSegments === 0) {
                ctx.beginPath();
                ctx.arc(radius, radius, radius - 10, 0, 2 * Math.PI);
                ctx.fillStyle = '#eee';
                ctx.fill();
                ctx.fillStyle = '#999';
                ctx.textAlign = 'center';
                ctx.fillText('請在左側輸入名單', radius, radius);
                return;
            }

            const arcSize = (2 * Math.PI) / numSegments;

            names.forEach((name, i) => {
                const angle = i * arcSize + currentRotation;
                
                // 畫扇形
                ctx.beginPath();
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + arcSize);
                ctx.fillStyle = `hsl(${(i * 360 / numSegments)}, 70%, 60%)`;
                ctx.fill();
                ctx.stroke();

                // 畫文字
                ctx.save();
                ctx.translate(radius, radius);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.fillText(name, radius - 20, 10);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning || getNames().length === 0) return;
            isSpinning = true;

            const names = getNames();
            const extraSpins = 5 + Math.random() * 5; // 隨機轉 5~10 圈
            const finalRotation = extraSpins * 2 * Math.PI;
            let startTime = null;
            const duration = 4000; // 旋轉 4 秒

            function animate(currentTime) {
                if (!startTime) startTime = currentTime;
                const progress = (currentTime - startTime) / duration;

                // 使用 Ease-out 減速曲線
                const easing = 1 - Math.pow(1 - progress, 3);
                const rotation = easing * finalRotation;
                
                currentRotation = rotation % (2 * Math.PI);
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    determineWinner(names);
                }
            }
            requestAnimationFrame(animate);
        }

        function determineWinner(names) {
            const numSegments = names.length;
            const arcSize = (2 * Math.PI) / numSegments;
            
            // 計算箭頭 (正上方 -PI/2) 指向哪個區塊
            // 由於旋轉是順時針，我們需要逆推回索引
            let winningIndex = Math.floor(( (1.5 * Math.PI - currentRotation) % (2 * Math.PI) + (2 * Math.PI) ) % (2 * Math.PI) / arcSize);
            
            alert("🎉 中獎的是： " + names[winningIndex]);
        }

        drawWheel(); // 初始化
    </script>
</body>
</html>
