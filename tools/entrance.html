<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能入口頁</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-grad-1: #1a1a2e;
            --bg-grad-2: #16213e;
            --bg-grad-3: #0f3460;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #a0aab2;
            --accent: #e94560;
            --accent-hover: #ff6b81;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 50%, var(--bg-grad-3) 100%);
            color: var(--text-primary);
            overflow: hidden;
            padding: 20px;
        }

        /* Animated background blob */
        .background-blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, rgba(233,69,96,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 10s infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #a0aab2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: all 0.6s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .card:hover::before {
            left: 100%;
        }

        .icon-container {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: rgba(233, 69, 96, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 1.5rem;
            color: var(--accent);
            transition: all 0.3s ease;
        }

        .card:hover .icon-container {
            background: var(--accent);
            color: white;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            transform: scale(1.1);
        }

        .icon-container svg {
            width: 30px;
            height: 30px;
            fill: currentColor;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }

        .desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="background-blob"></div>
    <div class="container">
        <header>
            <h1>功能服務入口</h1>
            <p class="subtitle">請選擇您要使用的功能模組</p>
        </header>

        <div class="grid">
            <!-- QR Code -->
            <a href="qr_code.html" class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3zm2 2v4h4V5zm8-2h8v8h-8zm2 2v4h4V5zM3 13h8v8H3zm2 2v4h4v-4zm13-2h-3v2h3zm-3 5h3v2h-3zm-2-3h2v2h-2zm3 0h2v2h-2zm-1-3h2v2h-2z"/></svg>
                </div>
                <div class="title">QR Code</div>
                <div class="desc"></div>
            </a>

            <!-- Ranking -->
            <a href="ranking.html" class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 24 24"><path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-6h4v6z"/></svg>
                </div>
                <div class="title">排行榜</div>
                <div class="desc"></div>
            </a>

            <!-- Roulette -->
            <a href="roulette.html" class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 2v10l7 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <div class="title">輪盤</div>
                <div class="desc"></div>
            </a>

            <!-- Schedule -->
            <a href="schedule.html" class="card">
                <div class="icon-container">
                    <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>
                </div>
                <div class="title">行程表</div>
                <div class="desc"></div>
            </a>
        </div>
    </div>
</body>
</html>
